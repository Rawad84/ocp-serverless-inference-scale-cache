apiVersion: batch/v1
kind: Job
metadata:
  name: handlers-loader
  namespace: inference-benchmark
  labels:
    app: inference-benchmark
    component: handlers-loader
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: inference-benchmark
        component: handlers-loader
    spec:
      restartPolicy: Never
      containers:
        - name: loader
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Populating PVC with handler versions..."

              mkdir -p /handlers/v1 /handlers/v2 /handlers/v3

              cp /config/v1-predict_handler.py /handlers/v1/predict_handler.py
              cp /config/v2-predict_handler.py /handlers/v2/predict_handler.py
              cp /config/v3-predict_handler.py /handlers/v3/predict_handler.py

              echo ""
              echo "Handler versions on PVC:"
              find /handlers -name "predict_handler.py" | sort
              echo ""
              echo "Done."
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: handlers
              mountPath: /handlers
      volumes:
        - name: config
          configMap:
            name: inference-handlers
        - name: handlers
          persistentVolumeClaim:
            claimName: inference-handlers-pvc
