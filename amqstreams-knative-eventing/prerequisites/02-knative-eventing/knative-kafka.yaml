# Connects Knative Eventing to AMQ Streams.
# Enables KafkaSource and KafkaChannel in Knative Eventing.
# Apply after Kafka cluster is Ready.
apiVersion: operator.serverless.openshift.io/v1alpha1
kind: KnativeKafka
metadata:
  name: knative-kafka
  namespace: knative-eventing
spec:
  channel:
    enabled: true
    bootstrapServers: inference-kafka-kafka-bootstrap.inference-benchmark.svc:9092
  source:
    enabled: true
